name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example v0.1.3
        required: true
        type: string
      publish_npm:
        description: Publish @abuswami1996/agent-md to npm
        required: true
        default: false
        type: boolean
      publish_vscode:
        description: Publish agent-md-preview to the Visual Studio Marketplace
        required: true
        default: false
        type: boolean
      publish_openvsx:
        description: Publish agent-md-preview to Open VSX
        required: true
        default: false
        type: boolean
      create_github_release:
        description: Create a GitHub Release and upload the VSIX
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build test dependencies
        run: npm run build:test-deps

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npm run package -w agent-md-preview

      - name: Rebuild CLI with bundled VSIX
        run: npm run build -w @abuswami1996/agent-md

      - name: Inspect npm package
        run: npm pack --dry-run -w @abuswami1996/agent-md

      - name: Inspect VSIX package
        run: npm run ls:vsix -w agent-md-preview

      - name: Check release artifacts
        run: npm run release:check
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          PUBLISH_NPM: ${{ inputs.publish_npm }}
          PUBLISH_VSCODE: ${{ inputs.publish_vscode }}
          PUBLISH_OPENVSX: ${{ inputs.publish_openvsx }}

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Publish VSCode Marketplace
        if: ${{ inputs.publish_vscode }}
        run: npx vsce publish --no-dependencies -p "$VSCE_PAT"
        working-directory: packages/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish Open VSX
        if: ${{ inputs.publish_openvsx }}
        run: npx ovsx publish packages/vscode-extension/dist/agent-md-preview.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish npm
        if: ${{ inputs.publish_npm }}
        run: npm publish -w @abuswami1996/agent-md --access public --provenance

      - name: Create GitHub Release
        if: ${{ inputs.create_github_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Agent Markdown ${{ inputs.tag }}
          generate_release_notes: true
          files: packages/vscode-extension/dist/agent-md-preview.vsix
